<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Build Fund CRM — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .logo {
      width: 56px;
      height: 56px;
      border-radius: 11px;
      background: linear-gradient(135deg, #b8912a, #f5c842);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      color: #fff;
      margin: 0 auto 1.5rem;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }
    p {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.5);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    button {
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(to right, #b8912a, #f5c842);
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 44px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">&#x20bf;</div>
    <h1>Jste offline</h1>
    <p>Build Fund CRM potřebuje připojení k internetu. Zkontrolujte připojení a zkuste to znovu.</p>
    <button onclick="location.reload()">Zkusit znovu</button>
  </div>
</body>
</html>
